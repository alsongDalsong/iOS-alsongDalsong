name: CI

on:
  pull_request: #dev 브랜치로 PR을 올릴 경우 실행
    branches: [ "dev" ]
    
  push: # test
    branches: ["feat/#48"]

jobs:
  build:
    name: 🛠️ build
    runs-on: macos-15

    steps:
    - name: 📁 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 💾 Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derivedDataCache-${{ hashFiles('**/*.xcworkspace/**', 'Podfile.lock') }}
        restore-keys: | #Cache miss 발생 시
          ${{ runner.os }}-derivedDataCache-
      
    - name: 🛠 Start alsongDalsong Build
      run: |
        echo "🚧 Starting build..."
        xcodebuild build \
          -workspace alsongDalsong.xcworkspace \
          -scheme alsongDalsong \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
          
    - name: 📦 Upload DerivedData
      uses: actions/upload-artifact@v4
      with:
        name: DerivedData
        path: ~/Library/Developer/Xcode/DerivedData
        
  test:
    name: 🧪 test
    needs: build
    runs-on: macos-15
    
    steps:
    
    - name: 📁 Checkout Repository
      uses: actions/checkout@v4

    - name: 📥 Download DerivedData
      uses: actions/download-artifact@v4
      with:
        name: DerivedData
        path: ~/Library/Developer/Xcode/DerivedData
          
    - name: 🧾 Get Test Schemes
      run: |
        echo "🔍 Finding test schemes..."
        SCHEMES=$(xcodebuild -list -workspace alsongDalsong.xcworkspace | \
          awk '/Schemes:/, /Targets:/' | sed -e '1d;$d' | grep 'Tests' | tr '\n' ' ')
        echo "✅ Found test schemes: $SCHEMES"
        echo "SCHEMES=$SCHEMES" >> $GITHUB_ENV
    
    - name: 🚀 Boot Simulator
      run: |
        xcrun simctl boot "iPhone 16" || echo "Already booted"
    
    - name: 🔍 Run All Test Schemes
      run: |
        for SCHEME in $SCHEMES; do
          echo "🧪 Testing Start scheme: $SCHEME"
          xcodebuild test \
            -workspace alsongDalsong.xcworkspace \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -parallel-testing-enabled YES || exit 1 
        done
